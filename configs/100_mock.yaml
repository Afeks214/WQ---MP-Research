run_name: "mock_100_strategy_validation"

symbols: [SPY, QQQ, IWM, TLT]

data:
  root: "./data/minute"
  format: "parquet"
  timestamp_column: "timestamp"
  start: "2024-01-02T00:00:00Z"
  end: "2024-01-11T23:59:59Z"

engine:
  B: 240
  x_min: -6.0
  dx: 0.05
  initial_cash: 1000000.0
  intraday_leverage_max: 6.0
  overnight_leverage: 2.0
  overnight_positions_max: 1
  daily_loss_limit_abs: 50000.0
  seed: 17
  fail_on_nan: true
  tick_size_default: 0.01

# 5 variants
module2_configs:
  - profile_window_bars: 45
    profile_warmup_bars: 45
    atr_span: 10
    rvol_lookback_sessions: 12
    va_threshold: 0.68
    fail_on_non_finite_output: true

  - profile_window_bars: 60
    profile_warmup_bars: 60
    atr_span: 14
    rvol_lookback_sessions: 20
    va_threshold: 0.70
    fail_on_non_finite_output: true

  - profile_window_bars: 75
    profile_warmup_bars: 75
    atr_span: 18
    rvol_lookback_sessions: 20
    va_threshold: 0.72
    fail_on_non_finite_output: true

  - profile_window_bars: 90
    profile_warmup_bars: 90
    atr_span: 21
    rvol_lookback_sessions: 24
    va_threshold: 0.74
    fail_on_non_finite_output: true

  - profile_window_bars: 120
    profile_warmup_bars: 120
    atr_span: 30
    rvol_lookback_sessions: 30
    va_threshold: 0.75
    fail_on_non_finite_output: true

# 4 variants
module3_configs:
  - block_minutes: 15
    phase_mask: [1, 2]
    min_block_valid_bars: 8
    min_block_valid_ratio: 0.65
    fail_on_non_finite_output: false

  - block_minutes: 20
    phase_mask: [1, 2]
    min_block_valid_bars: 10
    min_block_valid_ratio: 0.70
    fail_on_non_finite_output: false

  - block_minutes: 30
    phase_mask: [1, 2]
    min_block_valid_bars: 12
    min_block_valid_ratio: 0.70
    fail_on_non_finite_output: false

  - block_minutes: 45
    phase_mask: [1, 2]
    min_block_valid_bars: 12
    min_block_valid_ratio: 0.70
    fail_on_non_finite_output: false

# 5 variants
module4_configs:
  - entry_threshold: 0.50
    exit_threshold: 0.20
    top_k_intraday: 5
    max_asset_cap_frac: 0.30
    max_turnover_frac_per_bar: 0.35
    overnight_min_conviction: 0.60
    allow_cash_overnight: true
    fail_on_non_finite_input: false
    fail_on_non_finite_output: false

  - entry_threshold: 0.55
    exit_threshold: 0.25
    top_k_intraday: 5
    max_asset_cap_frac: 0.30
    max_turnover_frac_per_bar: 0.35
    overnight_min_conviction: 0.65
    allow_cash_overnight: true
    fail_on_non_finite_input: false
    fail_on_non_finite_output: false

  - entry_threshold: 0.60
    exit_threshold: 0.30
    top_k_intraday: 4
    max_asset_cap_frac: 0.28
    max_turnover_frac_per_bar: 0.30
    overnight_min_conviction: 0.70
    allow_cash_overnight: true
    fail_on_non_finite_input: false
    fail_on_non_finite_output: false

  - entry_threshold: 0.65
    exit_threshold: 0.30
    top_k_intraday: 3
    max_asset_cap_frac: 0.25
    max_turnover_frac_per_bar: 0.28
    overnight_min_conviction: 0.72
    allow_cash_overnight: true
    fail_on_non_finite_input: false
    fail_on_non_finite_output: false

  - entry_threshold: 0.70
    exit_threshold: 0.35
    top_k_intraday: 2
    max_asset_cap_frac: 0.22
    max_turnover_frac_per_bar: 0.25
    overnight_min_conviction: 0.75
    allow_cash_overnight: true
    fail_on_non_finite_input: false
    fail_on_non_finite_output: false

harness:
  seed: 97
  timezone: "America/New_York"
  freq: "1min"
  min_asset_coverage: 0.80
  purge_bars: 30
  embargo_bars: 15
  wf_train_sessions: 3
  wf_test_sessions: 2
  wf_step_sessions: 1
  cpcv_slices: 4
  cpcv_k_test: 2
  parallel_backend: "process_pool"
  parallel_workers: 4
  stress_profile: "baseline_mild_severe"
  max_ram_utilization_frac: 0.70
  enforce_lookahead_guard: true
  report_dir: "./artifacts"
  fail_on_non_finite: true
  daily_return_min_days: 2
  benchmark_symbol: "SPY"
  export_micro_diagnostics: false

stress_scenarios:
  - scenario_id: "baseline"
    name: "baseline"
    missing_burst_prob: 0.0
    missing_burst_min: 0
    missing_burst_max: 0
    jitter_sigma_bps: 0.0
    slippage_mult: 1.0
    enabled: true

candidates:
  mode: "auto_grid"
  specs: []
