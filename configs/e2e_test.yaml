run_name: "e2e_smoke_fixed"
symbols: [SPY, QQQ, IWM, TLT]

data:
  root: "./data/minute"
  format: "parquet"
  timestamp_column: "timestamp"
  start: "2024-01-02T00:00:00Z"
  end: "2024-01-31T23:59:59Z"

engine:
  B: 240
  x_min: -6.0
  dx: 0.05
  initial_cash: 1000000.0
  intraday_leverage_max: 2000.0
  overnight_leverage: 2000.0
  overnight_positions_max: 1
  daily_loss_limit_abs: 1000000.0
  seed: 17
  fail_on_nan: true
  tick_size_default: 0.01

module2_configs:
  - profile_window_bars: 60
    profile_warmup_bars: 60
    fail_on_non_finite_output: true

module3_configs:
  - block_minutes: 30
    phase_mask: [1, 2]
    fail_on_non_finite_output: false

module4_configs:
  - entry_threshold: 10.0
    exit_threshold: 10.0
    top_k_intraday: 1
    max_asset_cap_frac: 0.000001
    max_turnover_frac_per_bar: 0.15
    overnight_min_conviction: 1000000000.0
    allow_cash_overnight: true
    fail_on_non_finite_input: false
    fail_on_non_finite_output: false

harness:
  seed: 97
  timezone: "America/New_York"
  min_asset_coverage: 0.80
  purge_bars: 30
  embargo_bars: 15
  wf_train_sessions: 4
  wf_test_sessions: 4
  wf_step_sessions: 4
  cpcv_slices: 10
  cpcv_k_test: 5
  parallel_backend: "serial"
  parallel_workers: 1
  stress_profile: "baseline_mild_severe"
  max_ram_utilization_frac: 0.70
  enforce_lookahead_guard: true
  report_dir: "./artifacts"
  fail_on_non_finite: true
  daily_return_min_days: 2
  benchmark_symbol: "SPY"
  export_micro_diagnostics: false
  cluster_corr_threshold: 0.90
  cluster_distance_block_size: 128
  cluster_distance_in_memory_max_n: 500
  execution_transaction_cost_per_trade: 0.0
  execution_slippage_mult: 1.0
  execution_extra_slippage_bps: 0.0
  execution_latency_bars: 1
  regime_vol_window: 20
  regime_slope_window: 20
  regime_hurst_window: 40
  regime_min_obs_per_mask: 5
  horizon_minutes: [1, 5, 15, 60]
  robustness_weight_dsr: 0.20
  robustness_weight_pbo: 0.15
  robustness_weight_spa: 0.10
  robustness_weight_regime: 0.20
  robustness_weight_execution: 0.20
  robustness_weight_horizon: 0.15
  robustness_reject_threshold: 0.60
  execution_fragile_threshold: 0.50

stress_scenarios:
  - scenario_id: "baseline"
    name: "baseline"
    missing_burst_prob: 0.0
    missing_burst_min: 0
    missing_burst_max: 0
    jitter_sigma_bps: 0.0
    slippage_mult: 1.0
    enabled: true

candidates:
  mode: "auto_grid"
  specs: []
