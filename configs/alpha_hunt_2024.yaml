run_name: "alpha_hunt_2024_spy_qqq"

symbols: [SPY, QQQ]

data:
  root: "./data/minute"
  format: "parquet"
  path_by_symbol:
    SPY: "SPY_2024.normalized.parquet"
    QQQ: "QQQ_2024.normalized.parquet"
  timestamp_column: "timestamp"
  start: "2024-01-02T00:00:00Z"
  end: "2024-12-31T23:59:59Z"

engine:
  B: 240
  x_min: -6.0
  dx: 0.05
  initial_cash: 1000000.0
  intraday_leverage_max: 6.0
  overnight_leverage: 2.0
  overnight_positions_max: 1
  daily_loss_limit_abs: 50000.0
  seed: 17
  fail_on_nan: true
  tick_size_default: 0.01
  tick_size_by_symbol:
    SPY: 0.01
    QQQ: 0.01

module2_configs:
  - profile_window_bars: 45
    profile_warmup_bars: 45
    atr_span: 10
    rvol_lookback_sessions: 15
    va_threshold: 0.68
    fail_on_non_finite_output: true

  - profile_window_bars: 90
    profile_warmup_bars: 90
    atr_span: 21
    rvol_lookback_sessions: 30
    va_threshold: 0.72
    fail_on_non_finite_output: true

module3_configs:
  - block_minutes: 30
    phase_mask: [1, 2]
    use_rth_minutes_only: true
    rth_open_minute: 570
    last_minute_inclusive: 945
    include_partial_last_block: true
    min_block_valid_bars: 12
    min_block_valid_ratio: 0.70
    ib_pop_frac: 0.01
    context_mode: "ffill_last_complete"
    fail_on_non_finite_input: true
    fail_on_non_finite_output: true
    fail_on_bad_indices: true
    fail_on_missing_prev_va: false
    eps: 1.0e-12

module4_configs:
  - entry_threshold: 0.55
    exit_threshold: 0.25
    top_k_intraday: 2
    max_asset_cap_frac: 0.60
    max_turnover_frac_per_bar: 0.35
    overnight_min_conviction: 0.60
    allow_cash_overnight: true
    hard_kill_on_daily_loss_breach: true
    fail_on_non_finite_input: true
    fail_on_non_finite_output: true

  - entry_threshold: 0.60
    exit_threshold: 0.28
    top_k_intraday: 2
    max_asset_cap_frac: 0.55
    max_turnover_frac_per_bar: 0.30
    overnight_min_conviction: 0.68
    allow_cash_overnight: true
    hard_kill_on_daily_loss_breach: true
    fail_on_non_finite_input: true
    fail_on_non_finite_output: true

  - entry_threshold: 0.65
    exit_threshold: 0.30
    top_k_intraday: 1
    max_asset_cap_frac: 0.50
    max_turnover_frac_per_bar: 0.25
    overnight_min_conviction: 0.75
    allow_cash_overnight: true
    hard_kill_on_daily_loss_breach: true
    fail_on_non_finite_input: true
    fail_on_non_finite_output: true

harness:
  seed: 97
  timezone: "America/New_York"
  freq: "1min"
  min_asset_coverage: 0.80
  purge_bars: 60
  embargo_bars: 30
  wf_train_sessions: 90
  wf_test_sessions: 21
  wf_step_sessions: 21
  cpcv_slices: 6
  cpcv_k_test: 3
  parallel_backend: "process_pool"
  parallel_workers: 4
  stress_profile: "baseline_mild_severe"
  max_ram_utilization_frac: 0.70
  enforce_lookahead_guard: true
  report_dir: "./artifacts"
  fail_on_non_finite: true
  daily_return_min_days: 60
  benchmark_symbol: "SPY"
  export_micro_diagnostics: false

stress_scenarios:
  - scenario_id: "baseline"
    name: "baseline"
    missing_burst_prob: 0.0
    missing_burst_min: 0
    missing_burst_max: 0
    jitter_sigma_bps: 0.0
    slippage_mult: 1.0
    enabled: true

  - scenario_id: "mild"
    name: "mild"
    missing_burst_prob: 0.0005
    missing_burst_min: 2
    missing_burst_max: 5
    jitter_sigma_bps: 1.5
    slippage_mult: 1.5
    enabled: true

candidates:
  mode: "auto_grid"
  specs: []
