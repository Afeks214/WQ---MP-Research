  module2_window_count: 1
  module3_window_count: 4
  total_m4_configs: 96
  total_candidates: 768
  candidate_count_per_block_window: 192
  family_entries:
  - family_name: family_a_activation_frontier
    research_purpose: Expand the entry/regime activation frontier under adaptive multi-window
      selection.
    local_live_axes:
      entry_threshold:
      - 0.48
      - 0.54
      - 0.6
      - 0.66
      - 0.72
      - 0.78
      regime_confidence_min:
      - 0.4
      - 0.52
      - 0.64
      - 0.76
    local_m4_index_range:
    - 0
    - 23
    local_m4_config_count: 24
    local_candidate_count: 192
  - family_name: family_b_hysteresis_persistence
    research_purpose: Test hold-vs-churn persistence with entry/exit hysteresis and
      conviction scaling.
    local_live_axes:
      entry_threshold:
      - 0.5
      - 0.58
      - 0.66
      - 0.74
      exit_threshold:
      - 0.1
      - 0.2
      - 0.3
      conviction_scale:
      - 0.85
      - 1.15
    local_m4_index_range:
    - 24
    - 47
    local_m4_config_count: 24
    local_candidate_count: 192
  - family_name: family_c_regime_classification
    research_purpose: Probe regime taxonomy sensitivity by moving trend and shape
      thresholds with confidence filtering.
    local_live_axes:
      trend_spread_min:
      - 0.03
      - 0.05
      - 0.07
      - 0.09
      shape_skew_min_abs:
      - 0.2
      - 0.35
      - 0.5
      regime_confidence_min:
      - 0.5
      - 0.68
    local_m4_index_range:
    - 48
    - 71
    local_m4_config_count: 24
    local_candidate_count: 192
  - family_name: family_d_window_scale_specialists
    research_purpose: Force single-window specialists and vary allocation concentration
      and conviction clipping.
    local_live_axes:
      fixed_window_index:
      - 0
      - 1
      - 2
      - 3
      max_abs_weight:
      - 0.25
      - 0.5
      - 0.75
      conviction_clip:
      - 0.75
      - 1.25
    local_m4_index_range:
    - 72
    - 95
    local_m4_config_count: 24
    local_candidate_count: 192
discovery_mode_policy:
  hard_fatal:
  - non-finite active-domain outputs
  - shape or contract mismatches
  - impossible state failures
  - worker contract failures
  - risk-engine contract failures
  - canonical execution authority violations
  soft_flag:
  - localized invariant reason codes with completed evaluation
  - fragile execution flags
  - candidate-level execution warnings that preserve runtime trust
  analysis_only:
  - threshold rejection policy
  - pass/fail policy thresholds for acceptance
  - execution robustness gating as a research filter
report_artifact:
  path: research_distribution_report.json
  required_fields:
  - sharpe_distribution
  - return_distribution
  - drawdown_distribution
  - cluster_analysis
  - top_5_percent_candidate_metrics
  - family_level_summary
  - window_level_summary
  - standard_reject_counts
  - standard_pass_counts
  - discovery_included_candidates
  - effective_return_signature_count
  - distinct_robustness_score_count
  - distinct_execution_robustness_count
