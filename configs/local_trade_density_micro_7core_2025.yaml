harness:
  seed: 97
  research_mode: discovery
  timezone: America/New_York
  freq: 1min
  min_asset_coverage: 0.8
  purge_bars: 30
  embargo_bars: 15
  wf_train_sessions: 4
  wf_test_sessions: 6
  wf_step_sessions: 2
  cpcv_slices: 2
  cpcv_k_test: 1
  parallel_backend: process_pool
  parallel_workers: 7
  stress_profile: baseline_only
  max_ram_utilization_frac: 0.8
  safety_margin_frac: 0.05
  safety_margin_min_bytes: 1073741824
  enforce_lookahead_guard: true
  report_dir: ./artifacts
  fail_on_non_finite: true
  daily_return_min_days: 2
  benchmark_symbol: SPY
  export_micro_diagnostics: true
  micro_diag_mode: events_only
  micro_diag_export_block_profiles: true
  micro_diag_export_funnel: true
  micro_diag_max_rows: 5000000

module6:
  intake:
    run_policy_class: representative_discovery
    min_availability_ratio: 0.25
    min_observed_sessions: 2
  generator:
    random_sparse_quota: 64
    cluster_balanced_quota: 16
    hrp_variant_quota: 12
    mv_variant_quota: 2
    random_sparse_batch_size: 16
    active_cardinality_choices:
    - 4
    - 6
    - 8
    - 12
    enable_mv_diagnostic: false
  scoring:
    min_cross_universe_support: 0.70
    shortlist_session_keep: 32
    shortlist_minute_keep: 12
    final_scalar_keep: 8
    final_primary_count: 2
    final_alternate_count: 2

stress_scenarios:
- scenario_id: baseline
  name: baseline
  missing_burst_prob: 0.0
  missing_burst_min: 0
  missing_burst_max: 0
  jitter_sigma_bps: 0.0
  slippage_mult: 1.0
  enabled: true

candidates:
  mode: auto_grid
  specs: []
